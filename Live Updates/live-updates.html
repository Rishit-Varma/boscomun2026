<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Updates - BoscoMUN 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/live-updates.css">
    <meta name="description" content="Get live updates, crisis announcements, and schedule changes for Bosco MUN 2026 in real-time." />
    <meta name="keywords" content="Bosco MUN 2026, live updates, crisis, school model united nations, Don Bosco Park Circus" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Bosco MUN 2026 | Live Updates" />
    <meta property="og:description" content="Stay updated with live crisis announcements and schedule changes for Bosco MUN 2026." />
    <meta property="og:image" content="https://boscomun.donboscoparkcircus.org/images/logo.png" />
    <meta property="og:url" content="https://boscomun.donboscoparkcircus.org/Live%20Updates/live-updates.html" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="../images/logo.avif" type="image/avif" />
</head>

<body>
    <header>
        <div id="navigation-container"></div>
    </header>

    <div class="header-wrapper">
        <div class="header-title">Live Updates</div>
        <div class="live-status-container">
            <span class="pulse-dot" id="status-dot"></span>
            <span id="connection-status">Initializing...</span>
        </div>
    </div>

    <div class="container">
        <!-- Crisis / Critical Ticker -->
        <div class="ticker-wrap" id="critical-ticker-container" style="display: none;">
            <div class="ticker-label">CRISIS ALERT</div>
            <div class="ticker">
                <div class="ticker__item" id="critical-ticker-text">Loading latest crisis alerts...</div>
            </div>
        </div>

        <div class="layout-grid">
            <!-- Left Side: Live Feed -->
            <main class="feed-section">
                <!-- Filter Controls -->
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">All Updates</button>
                    <button class="filter-btn" data-filter="disec">UNGA-DISEC</button>
                    <button class="filter-btn" data-filter="unsc">UNSC</button>
                    <button class="filter-btn" data-filter="lon">LON</button>
                    <button class="filter-btn" data-filter="wwc">WWC</button>
                    <button class="filter-btn" data-filter="oic">OIC</button>
                </div>

                <!-- Feed Container -->
                <div class="timeline" id="updates-timeline">
                    <!-- Loading state -->
                    <div class="loading-state" id="loading-spinner">
                        <div class="spinner"></div>
                        <p>Connecting to feed...</p>
                    </div>
                </div>
            </main>

        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <!-- Firebase Database & Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Load navbar script -->
    <script src="../js/loadnavbar.js"></script>
    <!-- Custom Live Updates Logic -->
    <script src="js/live-updates.js"></script>
</body>

</html>
