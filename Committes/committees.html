<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Committees · BoscoMUN 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/committees.css" />
    <meta name="description" content="Explore the five chambers of Bosco MUN 2026 at Don Bosco Park Circus, Kolkata." />
    <link rel="icon" href="../images/logo.avif" type="image/avif" />
</head>
<body>
    <header>
        <div id="navigation-container"></div>
    </header>

    <main class="chambers-viewport">
        <div class="chambers-container">
            <div class="chambers-header">
                <h1 class="page-title">the committees</h1>
            </div>

            <!-- Grid Layout showing all committees equally -->
            <div class="chambers-grid">
                
                <!-- CARD 1: DISEC -->
                <a href="disec.html" class="committee-card" id="card-disec">
                    <div class="card-glow"></div>
                    <div class="card-pattern"></div>
                    <div class="card-inner">
                        <div class="logo-container">
                            <div class="logo-glow-ring"></div>
                            <img src="../images/committee-logos/disec.avif" alt="DISEC Logo" class="committee-logo">
                        </div>
                        
                        <h2 class="committee-title">UNGA-DISEC</h2>
                        <h3 class="committee-subtitle">United Nations General Assembly - Disarmament and International Security Committee</h3>
                    </div>
                </a>

                <!-- CARD 2: UNSC -->
                <a href="unsc.html" class="committee-card" id="card-unsc">
                    <div class="card-glow"></div>
                    <div class="card-pattern"></div>
                    <div class="card-inner">
                        <div class="logo-container">
                            <div class="logo-glow-ring"></div>
                            <img src="../images/committee-logos/unsc.avif" alt="UNSC Logo" class="committee-logo">
                        </div>
                        
                        <h2 class="committee-title">UNSC</h2>
                        <h3 class="committee-subtitle">United Nations Security Council</h3>
                    </div>
                </a>

                <!-- CARD 3: LON -->
                <a href="lon.html" class="committee-card" id="card-lon">
                    <div class="card-glow"></div>
                    <div class="card-pattern"></div>
                    <div class="card-inner">
                        <div class="logo-container">
                            <div class="logo-glow-ring"></div>
                            <img src="../images/committee-logos/lon.avif" alt="LON Logo" class="committee-logo">
                        </div>
                        
                        <h2 class="committee-title">LON</h2>
                        <h3 class="committee-subtitle">League of Nations</h3>
                    </div>
                </a>

                <!-- CARD 4: WWC -->
                <a href="wwc.html" class="committee-card" id="card-wwc">
                    <div class="card-glow"></div>
                    <div class="card-pattern"></div>
                    <div class="card-inner">
                        <div class="logo-container">
                            <div class="logo-glow-ring"></div>
                            <img src="../images/committee-logos/wwc.avif" alt="WWC Logo" class="committee-logo">
                        </div>
                        
                        <h2 class="committee-title">WWC</h2>
                        <h3 class="committee-subtitle">Wilhelm's War Cabinet</h3>
                    </div>
                </a>

                <!-- CARD 5: OIC -->
                <a href="oic.html" class="committee-card" id="card-oic">
                    <div class="card-glow"></div>
                    <div class="card-pattern"></div>
                    <div class="card-inner">
                        <div class="logo-container">
                            <div class="logo-glow-ring"></div>
                            <img src="../images/committee-logos/oic.avif" alt="OIC Logo" class="committee-logo">
                        </div>
                        
                        <h2 class="committee-title">OIC</h2>
                        <h3 class="committee-subtitle">Organisation of the Islamic Conference</h3>
                    </div>
                </a>

            </div>
        </div>
    </main>

    <script src="../js/loadnavbar.js"></script>
</body>
</html>
