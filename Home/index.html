<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bosco MUN 2026</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <meta name="description" content="Join Bosco MUN 2026, the 11th edition at Don Bosco Park Circus, Kolkata." />
    <meta name="keywords" content="Bosco MUN 2026, Kolkata school model united nations, events Kolkata, Don Bosco Park Circus, student mun" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Bosco MUN 2026 | The 11th Edition" />
    <meta property="og:description" content="Join Bosco MUN 2026, the 11th edition at Don Bosco Park Circus, Kolkata." />
    <meta property="og:image" content="https://boscomun.donboscoparkcircus.org/images/logo.png" />
    <meta property="og:url" content="https://boscomun.donboscoparkcircus.org/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bosco MUN 2026 | 11th edition" />
    <meta name="twitter:description" content="Join Bosco MUN 2026, the 11th edition at Don Bosco Park Circus, Kolkata." />
    <meta name="twitter:image" content="https://www.boscomun.donboscoparkcircus.org/images/logo.png" />
    <link rel="icon" href="./images/logo.avif" type="image/avif" />
</head>

<body>
    <header>
        <div id="navigation-container"></div>
    </header>
    <main class="main-content-layout">
        <!-- Center Orbiting System -->
        <div class="orbit-wrapper">
            <!-- Center Branding and Main Logo -->
            <div class="center-branding">
                <div class="logo-glow-ring"></div>
                <a href="../About/about.html" style="display: inline-block; z-index: 15; position: relative;">
                    <img class="center-logo" src="./images/logo.avif" alt="Bosco MUN Logo">
                </a>
                <h1 class="theme-title">BEYOND<br>CONFLICT</h1>
                <h2 class="theme-subtitle">THE ELEVENTH EDITION</h2>
            </div>

            <!-- Orbiting Committees -->
            <div class="orbit-ring">
                <!-- UNSC -->
                <a class="orbit-marker unsc-orbit" href="../Committes/unsc.html">
                    <img class="comm-logo" src="./images/committee-logos/unsc.avif" alt="UNSC">
                    <span class="comm-label">UNSC</span>
                </a>
                <!-- LON -->
                <a class="orbit-marker lon-orbit" href="../Committes/lon.html">
                    <img class="comm-logo" src="./images/committee-logos/lon.avif" alt="LON">
                    <span class="comm-label">LON</span>
                </a>
                <!-- WWC -->
                <a class="orbit-marker wwc-orbit" href="../Committes/wwc.html">
                    <img class="comm-logo" src="./images/committee-logos/wwc.avif" alt="WWC">
                    <span class="comm-label">WWC</span>
                </a>
                <!-- DISEC -->
                <a class="orbit-marker disec-orbit" href="../Committes/disec.html">
                    <img class="comm-logo" src="./images/committee-logos/disec.avif" alt="DISEC">
                    <span class="comm-label">DISEC</span>
                </a>
                <!-- OIC -->
                <a class="orbit-marker oic-orbit" href="../Committes/oic.html">
                    <img class="comm-logo" src="./images/committee-logos/oic.avif" alt="OIC">
                    <span class="comm-label">OIC</span>
                </a>
            </div>
        </div>

        <!-- Countdown Timer -->
        <div class="countdown-section">
            <h3 class="countdown-heading">Conference Countdown</h3>
            <div class="countdown-container" id="countdown">
                <div class="countdown-box">
                    <span class="countdown-num" id="days">00</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-box">
                    <span class="countdown-num" id="hours">00</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-box">
                    <span class="countdown-num" id="minutes">00</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-box">
                    <span class="countdown-num" id="seconds">00</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>
        </div>
    </main>
    <script src="./js/main.js"></script>
    <script src="../js/loadnavbar.js"></script>
</body>

</html>
