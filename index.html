<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bosco MUN 2026</title>
    <link rel="stylesheet" href="./css/style.css">
    <meta name="description" content="Join Bosco MUN 2026, the 11th edition at Don Bosco Park Circus, Kolkata." />
    <meta name="keywords" content="Bosco MUN 2026, Kolkata school model united nations, events Kolkata, Don Bosco Park Circus, student mun" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Bosco MUN 2026 | The 11th Edition" />
    <meta property="og:description" content="Join Bosco MUN 2026, the 11th edition at Don Bosco Park Circus, Kolkata." />
    <meta property="og:image" content="https://boscomun.donboscoparkcircus.org/images/logo.png" />
    <meta property="og:url" content="https://boscomun.donboscoparkcircus.org/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bosco MUN 2026 | 11th edition" />
    <meta name="twitter:description" content="Join Bosco MUN 2026, the 11th edition at Don Bosco Park Circus, Kolkata." />
    <meta name="twitter:image" content="https://www.boscomun.donboscoparkcircus.org/images/logo.png" />
    <link rel="icon" href="./images/logo.avif" type="image/avif" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
</head>

<body>
    <!-- Intro Shape Transition Loader -->
    <div id="intro-loader" class="intro-loader">
        <div class="intro-loader-content">
            <img class="intro-loader-logo" src="./images/logo.avif" alt="Bosco MUN Logo">
            <div class="intro-loader-text">BOSCO MUN 2026</div>
        </div>
    </div>

    <header>
        <!-- Dynamic Navigation Bar Loader -->
        <div id="navigation-container"></div>
    </header>

    <main class="main-content-layout">
        <!-- Split Dashboard Container -->
        <div class="content-split-layout">
            
            <!-- Left Side: Branding Column (Titles) -->
            <div class="text-column">
                <h1 class="theme-title">BEYOND<br>CONFLICT</h1>
                <h2 class="theme-subtitle">THE ELEVENTH EDITION</h2>
            </div>

            <!-- Center: Logo Column -->
            <div class="logo-column">
                <a class="hero-seal-container" href="./About/about.html">
                    <div class="seal-bg-glow"></div>
                    <img class="center-logo" src="./images/logo.avif" alt="Bosco MUN Logo" style="width: 100%; height: 100%; object-fit: contain; z-index: 2; filter: drop-shadow(0 0.4vh 1.2vh rgba(0,0,0,0.5));">
                </a>
            </div>

            <!-- Right Side: Timer Column -->
            <div class="timer-wrapper">
                <div class="timer-column">
                    <h3 class="countdown-heading">Conference Countdown</h3>
                    <div class="countdown-container" id="countdown">
                        <div class="countdown-box">
                            <span class="countdown-num" id="days">00</span>
                            <span class="countdown-label">Days</span>
                        </div>
                        <div class="countdown-box">
                            <span class="countdown-num" id="hours">00</span>
                            <span class="countdown-label">Hours</span>
                        </div>
                        <div class="countdown-box">
                            <span class="countdown-num" id="minutes">00</span>
                            <span class="countdown-label">Minutes</span>
                        </div>
                        <div class="countdown-box">
                            <span class="countdown-num" id="seconds">00</span>
                            <span class="countdown-label">Seconds</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 2. Section Divider -->
            <div class="section-divider-container">
                <div class="divider-line"></div>
            </div>

        </div>

        <!-- 3. Bottom Icon Row (Committees) -->
        <div class="committees-grid-container">
            <!-- UNGA (DISEC) -->
            <a class="committee-emblem-card" href="./Committes/disec.html">
                <div class="emblem-circle">
                    <img src="./images/committee-logos/disec.avif" alt="United Nations General Assembly Logo" style="width: 100%; height: 100%; object-fit: contain; z-index: 2;">
                </div>
                <span class="emblem-label">UNGA-DISEC</span>
            </a>

            <!-- UNSC -->
            <a class="committee-emblem-card" href="./Committes/unsc.html">
                <div class="emblem-circle">
                    <img src="./images/committee-logos/unsc.avif" alt="UNSC Logo" style="width: 100%; height: 100%; object-fit: contain; z-index: 2;">
                </div>
                <span class="emblem-label">UNSC</span>
            </a>

            <!-- LON -->
            <a class="committee-emblem-card" href="./Committes/lon.html">
                <div class="emblem-circle">
                    <img src="./images/committee-logos/lon.avif" alt="LON Logo" style="width: 100%; height: 100%; object-fit: contain; z-index: 2;">
                </div>
                <span class="emblem-label">LON</span>
            </a>

            <!-- WWC -->
            <a class="committee-emblem-card" href="./Committes/wwc.html">
                <div class="emblem-circle">
                    <img src="./images/committee-logos/wwc.avif" alt="WWC Logo" style="width: 100%; height: 100%; object-fit: contain; z-index: 2;">
                </div>
                <span class="emblem-label">WWC</span>
            </a>

            <!-- OIC -->
            <a class="committee-emblem-card" href="./Committes/oic.html">
                <div class="emblem-circle">
                    <img src="./images/committee-logos/oic.avif" alt="OIC Logo" style="width: 100%; height: 100%; object-fit: contain; z-index: 2;">
                </div>
                <span class="emblem-label">OIC</span>
            </a>
        </div>
    </main>

    <script src="./js/main.js"></script>
    <script src="./js/loadnavbar.js"></script>
    
    <!-- Countdown Timer Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Target date: August 3, 2026 08:00:00 (MUN Conference Start)
            const targetDate = new Date("August 3, 2026 08:00:00").getTime();
            
            function updateCountdown() {
                const now = Date.now();
                const difference = targetDate - now;
                
                const daysEl = document.getElementById("days");
                const hoursEl = document.getElementById("hours");
                const minutesEl = document.getElementById("minutes");
                const secondsEl = document.getElementById("seconds");
                
                if (!daysEl) return;
                
                if (difference <= 0) {
                    daysEl.innerText = "00";
                    hoursEl.innerText = "00";
                    minutesEl.innerText = "00";
                    secondsEl.innerText = "00";
                    return;
                }
                
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);
                
                daysEl.innerText = days < 10 ? "0" + days : days;
                hoursEl.innerText = hours < 10 ? "0" + hours : hours;
                minutesEl.innerText = minutes < 10 ? "0" + minutes : minutes;
                secondsEl.innerText = seconds < 10 ? "0" + seconds : seconds;
            }
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
    </script>
</body>

</html>
